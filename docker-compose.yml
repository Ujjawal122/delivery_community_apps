version: "3.9"

services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: delivery_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "ujjawal@123"
      POSTGRES_DB: delivery_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: delivery_redis
    restart: always
    command: redis-server --requirepass "redis@123" --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: